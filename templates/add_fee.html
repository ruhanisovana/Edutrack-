<!DOCTYPE html>
<html>
<head>
    <title>Add Fee Notice</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
            <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
            </head>
            <body>
                <div class="navbar">
                        <a href="/">Home</a>
                                <a href="/fees">Back to Fees</a>
                                    </div>

                                        <div class="container">
                                                <div class="school-header">
                                                            <h2>💰 Add Fee Notification</h2>
                                                                    </div>

                                                                                    <div class="table-header">Post New Fee Reminder</div>
                                                                                            <form action="/add_fee" method="post" style="background:white; padding:20px;">
                                                                                                        <input name="student_name" placeholder="Student Name" required>
                                                                                                                    <input name="class_name" placeholder="Class e.g. 5A" required>
                                                                                                                                <input name="amount" type="number" step="0.01" placeholder="Amount" required>
                                                                                                                                            <input name="due_date" type="date" placeholder="Date" required>
                                                                                                                                                        <textarea name="message" placeholder="Message" rows="5"></textarea>
                                                                                                                                                                    <button type="submit">Send Fee Notice</button>
                                                                                                                                                                            </form>
                                                                                                                                                                                </div>
                                                                                                                                                                                </body>
                                                                                                                                                                                </html>
